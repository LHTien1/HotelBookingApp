name: booking_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  
  firebase_messaging: ^16.1.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3

  # State Management
  provider: ^6.1.1
  http_parser: ^4.0.2
  # Network
  http: ^1.2.2

  # UI & Maps
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Images
  image_picker: ^1.2.1
  cached_network_image: ^3.3.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  fluttertoast: ^9.0.0

  # VNPay Payment
  crypto: ^3.0.3
  app_links: ^6.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
